<svg width="100%" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NEXT Robotics Lab Thailand animated UGV footer">
  <defs>
    <linearGradient id="neonLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00eaff"/>
      <stop offset="50%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#00ff99"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00eaff"/>
      <stop offset="50%" stop-color="#8b5cff"/>
      <stop offset="100%" stop-color="#00ff99"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#17243a" stroke-width="1"/>
    </pattern>

    <clipPath id="roundClip">
      <rect x="20" y="20" width="1160" height="180" rx="24"/>
    </clipPath>
  </defs>

  <rect x="20" y="20" width="1160" height="180" rx="24" fill="#050914"/>
  <g clip-path="url(#roundClip)">
    <rect x="20" y="20" width="1160" height="180" fill="url(#grid)" opacity="0.55"/>

    <path d="M20 146 C160 126 250 160 390 138 C540 112 660 160 820 132 C980 104 1070 126 1180 106"
          fill="none" stroke="url(#neonLine)" stroke-width="3" stroke-linecap="round"
          stroke-dasharray="16 20" filter="url(#softGlow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-240" dur="5s" repeatCount="indefinite"/>
    </path>

    <text x="600" y="70" text-anchor="middle"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="34" font-weight="900" letter-spacing="4"
          fill="url(#titleGrad)" filter="url(#softGlow)">
      NEXT ROBOTICS LAB
    </text>

    <text x="600" y="100" text-anchor="middle"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="13" font-weight="700" letter-spacing="5"
          fill="#c7d4ff">
      THAILAND • AUTONOMOUS ROBOTICS • ROS 2 • UGV SYSTEMS
    </text>

    <g>
      <animateTransform attributeName="transform" type="translate" from="-260 0" to="1260 0" dur="8s" repeatCount="indefinite"/>

      <g transform="translate(0 128)" filter="url(#softGlow)">
        <ellipse cx="110" cy="54" rx="92" ry="10" fill="#00eaff" opacity="0.16">
          <animate attributeName="opacity" values="0.08;0.24;0.08" dur="1.8s" repeatCount="indefinite"/>
        </ellipse>

        <rect x="42" y="14" width="136" height="48" rx="14" fill="#07172a" stroke="#00eaff" stroke-width="2.5"/>
        <rect x="72" y="-8" width="76" height="34" rx="12" fill="#081d33" stroke="#7c4dff" stroke-width="2"/>
        <rect x="96" y="-28" width="28" height="22" rx="7" fill="#07172a" stroke="#00ff99" stroke-width="2"/>

        <circle cx="86" cy="38" r="7" fill="#00ff99">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="132" cy="38" r="7" fill="#00ff99">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
        </circle>

        <line x1="110" y1="-28" x2="154" y2="-48" stroke="#00eaff" stroke-width="3" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" values="-20 110 -28;20 110 -28;-20 110 -28" dur="1.4s" repeatCount="indefinite"/>
        </line>

        <circle cx="70" cy="66" r="18" fill="#050914" stroke="#00eaff" stroke-width="3"/>
        <path d="M70 48 L70 84 M52 66 L88 66" stroke="#00eaff" stroke-width="2" opacity="0.8">
          <animateTransform attributeName="transform" type="rotate" from="0 70 66" to="360 70 66" dur="0.8s" repeatCount="indefinite"/>
        </path>

        <circle cx="150" cy="66" r="18" fill="#050914" stroke="#00eaff" stroke-width="3"/>
        <path d="M150 48 L150 84 M132 66 L168 66" stroke="#00eaff" stroke-width="2" opacity="0.8">
          <animateTransform attributeName="transform" type="rotate" from="0 150 66" to="360 150 66" dur="0.8s" repeatCount="indefinite"/>
        </path>

        <path d="M30 34 L4 34 M26 48 L-24 48 M36 60 L-12 60"
              stroke="#00eaff" stroke-width="3" stroke-linecap="round" opacity="0.8">
          <animate attributeName="opacity" values="0.25;0.9;0.25" dur="0.7s" repeatCount="indefinite"/>
        </path>
      </g>
    </g>
  </g>

  <rect x="20" y="20" width="1160" height="180" rx="24"
        fill="none" stroke="url(#neonLine)" stroke-width="2" opacity="0.85">
    <animate attributeName="opacity" values="0.35;0.9;0.35" dur="3.2s" repeatCount="indefinite"/>
  </rect>
</svg>
