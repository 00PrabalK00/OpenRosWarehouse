<svg width="100%" height="420" viewBox="0 0 1400 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SMR300 animated SVG banner">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06101c"/>
      <stop offset="55%" stop-color="#08172e"/>
      <stop offset="100%" stop-color="#040814"/>
    </linearGradient>

    <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00eaff"/>
      <stop offset="50%" stop-color="#6a63ff"/>
      <stop offset="100%" stop-color="#00ff99"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c9e8ff"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#14304b" stroke-width="1"/>
    </pattern>

    <clipPath id="panelClip">
      <rect x="20" y="35" width="1360" height="350" rx="30"/>
    </clipPath>
  </defs>

  <!-- main panel -->
  <rect x="20" y="35" width="1360" height="350" rx="30" fill="url(#bgGrad)"/>
  <g clip-path="url(#panelClip)">
    <rect x="20" y="35" width="1360" height="350" fill="url(#grid)" opacity="0.35"/>

    <!-- moving route lines -->
    <path d="M0 310 C160 260 320 350 510 290 C720 220 900 335 1120 285 C1230 262 1320 275 1410 260"
          fill="none" stroke="#3ca7ff" stroke-width="4" stroke-linecap="round" stroke-dasharray="18 24" opacity="0.9" filter="url(#softGlow)">
      <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="8s" repeatCount="indefinite"/>
    </path>

    <path d="M0 140 C180 150 330 110 520 140 C720 172 860 125 1060 150 C1200 170 1300 175 1410 160"
          fill="none" stroke="#00a8ff" stroke-width="3" stroke-linecap="round" stroke-dasharray="14 20" opacity="0.35">
      <animate attributeName="stroke-dashoffset" from="0" to="220" dur="10s" repeatCount="indefinite"/>
    </path>

    <path d="M1180 265 C1270 270 1340 270 1420 265"
          fill="none" stroke="#00ff99" stroke-width="4" stroke-linecap="round" stroke-dasharray="14 16" opacity="0.8">
      <animate attributeName="stroke-dashoffset" from="0" to="-90" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- left text block -->
    <g transform="translate(90 120)">
      <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="84" font-weight="900" fill="url(#textGrad)" filter="url(#glow)">SMR300</text>

      <text x="0" y="58" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#a8c8ff" letter-spacing="6">AUTONOMOUS UGV PLATFORM</text>

      <rect x="0" y="92" width="80" height="5" rx="2.5" fill="#00eaff" filter="url(#glow)"/>

      <text x="0" y="155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="500" fill="#eef6ff">
      </text>

      <g transform="translate(0 205)">
        <rect x="0" y="0" width="190" height="54" rx="27" fill="rgba(0,0,0,0.16)" stroke="#00eaff" stroke-width="2.2"/>
        <circle cx="34" cy="27" r="9" fill="#00ff99" filter="url(#glow)">
          <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" repeatCount="indefinite"/>
        </circle>
        <text x="62" y="35" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">ROS 2 READY</text>
      </g>

      <g transform="translate(220 205)">
        <rect x="0" y="0" width="210" height="54" rx="27" fill="rgba(0,0,0,0.16)" stroke="#6a63ff" stroke-width="2.2"/>
        <circle cx="34" cy="27" r="9" fill="#20d7ff" filter="url(#glow)">
          <animate attributeName="opacity" values="0.35;1;0.35" dur="1.4s" repeatCount="indefinite"/>
        </circle>
        <text x="62" y="35" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">WAREHOUSE UGV</text>
      </g>
    </g>

    <!-- robot group -->
    <g transform="translate(780 92)">
      <animateTransform attributeName="transform" type="translate" values="780 92; 786 90; 780 92" dur="3s" repeatCount="indefinite"/>

      <!-- ground shadow -->
      <ellipse cx="235" cy="238" rx="260" ry="38" fill="#052746" opacity="0.4"/>

      <!-- base body -->
      <g filter="url(#softGlow)">
        <path d="M80 120
                 Q80 92 110 92
                 L410 92
                 Q445 92 445 128
                 L445 165
                 Q445 198 408 198
                 L110 198
                 Q78 198 78 165
                 Z"
              fill="#071529" stroke="#17d9ff" stroke-width="4"/>
      </g>

      <!-- darker lower body -->
      <path d="M115 115 L375 115 Q398 115 398 138 L398 173 L115 173 Z"
            fill="#0a1931" opacity="0.9"/>

      <!-- center module -->
      <rect x="175" y="42" width="210" height="90" rx="28" fill="#11172d" stroke="#7366ff" stroke-width="4" filter="url(#softGlow)"/>

      <!-- top sensor pod -->
      <g transform="translate(252 22)">
        <rect x="0" y="0" width="110" height="42" rx="18" fill="#0a1b31" stroke="#1fffb0" stroke-width="3"/>
        <line x1="63" y1="0" x2="120" y2="-28" stroke="#1ee8ff" stroke-width="4" stroke-linecap="round"/>
        <circle cx="120" cy="-28" r="6" fill="#1ee8ff" filter="url(#glow)"/>
      </g>

      <!-- front and back lidars -->
      <!-- front lidar -->
      <g transform="translate(108 104)">
        <ellipse cx="0" cy="0" rx="28" ry="9" fill="#0ee1ff"/>
        <rect x="-28" y="-20" width="56" height="28" rx="6" fill="#09243e" stroke="#20ddff" stroke-width="3"/>
        <ellipse cx="0" cy="-20" rx="28" ry="9" fill="#062038" stroke="#20ddff" stroke-width="3"/>
        <line x1="22" y1="7" x2="55" y2="18" stroke="#16d0ff" stroke-width="3"/>
        <g opacity="0.85">
          <path d="M35 -6 C60 -20 76 -22 100 -12" fill="none" stroke="#00ff99" stroke-width="3" stroke-linecap="round">
            <animate attributeName="opacity" values="0.15;0.9;0.15" dur="1.2s" repeatCount="indefinite"/>
          </path>
          <path d="M35 2 C60 -5 82 -3 108 10" fill="none" stroke="#00ff99" stroke-width="2.5" stroke-linecap="round">
            <animate attributeName="opacity" values="0.1;0.7;0.1" dur="1.2s" repeatCount="indefinite"/>
          </path>
        </g>
      </g>

      <!-- back lidar -->
      <g transform="translate(485 108)">
        <ellipse cx="0" cy="0" rx="28" ry="9" fill="#0ee1ff"/>
        <rect x="-28" y="-20" width="56" height="28" rx="6" fill="#09243e" stroke="#20ddff" stroke-width="3"/>
        <ellipse cx="0" cy="-20" rx="28" ry="9" fill="#062038" stroke="#20ddff" stroke-width="3"/>
        <line x1="-22" y1="7" x2="-55" y2="18" stroke="#16d0ff" stroke-width="3"/>
        <g opacity="0.85">
          <path d="M-35 -6 C-60 -20 -76 -22 -100 -12" fill="none" stroke="#00ff99" stroke-width="3" stroke-linecap="round">
            <animate attributeName="opacity" values="0.15;0.9;0.15" dur="1.2s" repeatCount="indefinite"/>
          </path>
          <path d="M-35 2 C-60 -5 -82 -3 -108 10" fill="none" stroke="#00ff99" stroke-width="2.5" stroke-linecap="round">
            <animate attributeName="opacity" values="0.1;0.7;0.1" dur="1.2s" repeatCount="indefinite"/>
          </path>
        </g>
      </g>

      <!-- small side modules -->
      <rect x="76" y="140" width="28" height="22" rx="8" fill="#0a1730" stroke="#00ff99" stroke-width="3"/>
      <rect x="439" y="140" width="28" height="22" rx="8" fill="#0a1730" stroke="#00ff99" stroke-width="3"/>

      <!-- wheel set -->
      <g>
        <circle cx="175" cy="210" r="47" fill="#07111f" stroke="#18e7ff" stroke-width="5"/>
        <circle cx="395" cy="210" r="47" fill="#07111f" stroke="#18e7ff" stroke-width="5"/>

        <g>
          <g>
            <path d="M175 176 L175 244 M141 210 L209 210 M151 186 L199 234 M199 186 L151 234"
                  stroke="#18e7ff" stroke-width="3.5" stroke-linecap="round">
              <animateTransform attributeName="transform" type="rotate" from="0 175 210" to="360 175 210" dur="1.1s" repeatCount="indefinite"/>
            </path>
          </g>

          <g>
            <path d="M395 176 L395 244 M361 210 L429 210 M371 186 L419 234 M419 186 L371 234"
                  stroke="#18e7ff" stroke-width="3.5" stroke-linecap="round">
              <animateTransform attributeName="transform" type="rotate" from="0 395 210" to="360 395 210" dur="1.1s" repeatCount="indefinite"/>
            </path>
          </g>
        </g>
      </g>

      <!-- wheel baseline -->
      <line x1="160" y1="198" x2="410" y2="198" stroke="#1fd6ff" stroke-width="4"/>

      <!-- status lights -->
      <circle cx="248" cy="87" r="10" fill="#20f1a4" filter="url(#glow)">
        <animate attributeName="opacity" values="1;0.35;1" dur="1.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="288" cy="87" r="10" fill="#21dfff" filter="url(#glow)">
        <animate attributeName="opacity" values="0.35;1;0.35" dur="1.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="328" cy="87" r="10" fill="#8a7bff" filter="url(#glow)">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.3s" repeatCount="indefinite"/>
      </circle>

      <!-- motion streaks -->
      <g stroke-linecap="round" filter="url(#softGlow)">
        <path d="M28 136 H-36" stroke="#00ff99" stroke-width="4">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="0.7s" repeatCount="indefinite"/>
        </path>
        <path d="M10 160 H-54" stroke="#00eaff" stroke-width="4">
          <animate attributeName="opacity" values="1;0.2;1" dur="0.9s" repeatCount="indefinite"/>
        </path>
        <path d="M470 150 H518" stroke="#00eaff" stroke-width="4">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="0.7s" repeatCount="indefinite"/>
        </path>
        <path d="M488 170 H536" stroke="#00ff99" stroke-width="4">
          <animate attributeName="opacity" values="1;0.2;1" dur="0.9s" repeatCount="indefinite"/>
        </path>
      </g>
    </g>

    <!-- right status block moved inward -->
    
  </g>

  <!-- outer border -->
  <rect x="20" y="35" width="1360" height="350" rx="30" fill="none" stroke="url(#strokeGrad)" stroke-width="2.5" opacity="0.95" filter="url(#glow)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite"/>
  </rect>
</svg>