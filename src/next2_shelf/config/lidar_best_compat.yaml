distance_calculator:
  ros__parameters:
    scan_topic: /lds2/scan
    laser_frame: lidar_2_link
    use_roi: false
    publish_bounding_box: false
    intensity_threshold: 35
    eps: 0.25
    proximity_threshold: 0.25
    min_samples: 10
    min_sample: 10
    shelf_width: 1.0
    shelf_width_tolerance: 0.30
    dist_threshold: 0.80
    offset_length: 1.20
    min_distance: 0.60
    max_distance: 0.65
    require_pair_distance_gate: false
    marker_lifetime: 0.25
    detection_timeout: 0.50
    clear_tf_on_lost: true
    publish_goal_pose: true
    publish_legacy_goal: true
    enable_nav2_action: false
    navigation_action_name: navigate_to_pose
    goal_frame: lidar_2_link
    goal_offset_x: -0.20
    goal_offset_y: 0.10
    pause_during_navigation: true
    enable_jacking_action: false
    jacking_action_name: next_jacking_ac_server
    jacking_speed: 2500
    jacking_timeout: 100
    jacking_operation: 0
