distance_calculator:
  ros__parameters:
    scan_topic: /scan
    laser_frame: laser
    use_roi: true
    publish_bounding_box: true
    x_min: -3.0
    x_max: 3.0
    y_min: -1.5
    y_max: 1.5
    intensity_threshold: 50
    eps: 0.04
    proximity_threshold: 0.04
    min_samples: 3
    min_sample: 3
    shelf_width: 0.60
    shelf_width_tolerance: 0.10
    dist_threshold: 0.0
    offset_length: 0.64
    min_distance: 0.60
    max_distance: 0.65
    require_pair_distance_gate: true
    marker_lifetime: 0.25
    detection_timeout: 0.50
    clear_tf_on_lost: true
    publish_goal_pose: false
    publish_legacy_goal: true
    enable_nav2_action: false
    navigation_action_name: navigate_to_pose
    goal_frame: base_link
    goal_offset_x: 0.0
    goal_offset_y: 0.0
    pause_during_navigation: false
    enable_jacking_action: false
    jacking_action_name: next_jacking_ac_server
    jacking_speed: 2500
    jacking_timeout: 100
    jacking_operation: 0
