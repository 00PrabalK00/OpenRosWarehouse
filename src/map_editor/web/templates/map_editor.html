<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Map Editor - Warehouse Robot</title>
    <link rel="stylesheet" href="/static/css/map_editor.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Professional Map Editor</h1>
            <div class="header-info">
                <span id="resolution-info">Resolution: --</span>
                <span id="map-size">Map: -- x --</span>
                <label class="editing-toggle"><input type="checkbox" id="editing-enabled"> Enable Editing</label>
            </div>
        </header>

        <div class="toolbar">
            <div class="tool-group">
                <h3>Drawing Tools</h3>
                <button class="tool-btn" id="tool-obstacle-rect" data-tool="obstacle-rect">
                    Obstacle Rect
                </button>
                <button class="tool-btn" id="tool-obstacle-circle" data-tool="obstacle-circle">
                    Obstacle Circle
                </button>
                <button class="tool-btn" id="tool-obstacle-poly" data-tool="obstacle-poly">
                    Obstacle Polygon
                </button>
                <button class="tool-btn" id="tool-wall-line" data-tool="wall-line"
                        title="Draw a wall line — appears as dots in Dotted View">
                    Wall Line
                </button>
            </div>

            <div class="tool-group">
                <h3>Zone Tools</h3>
                <button class="tool-btn" id="tool-nogo" data-tool="nogo">
                    No-Go Zone
                </button>
                <button class="tool-btn" id="tool-slow" data-tool="slow">
                    Slow Zone
                </button>
                <div class="speed-input">
                    <label>Speed Limit:</label>
                    <input type="number" id="speed-limit" value="0.2" step="0.1" min="0.1" max="1.0">
                    <span>m/s</span>
                </div>
                <button class="tool-btn" id="tool-restricted" data-tool="restricted">
                    Restricted
                </button>
            </div>

            <div class="tool-group">
                <h3>Measurement</h3>
                <button class="tool-btn" id="tool-measure" data-tool="measure">
                    Measure Distance
                </button>
                <button class="tool-btn" id="tool-area" data-tool="area">
                    Measure Area
                </button>
                <div id="measurement-result">--</div>
            </div>

            <div class="tool-group">
                <h3>Layer Control</h3>
                <label><input type="checkbox" id="layer-obstacles" checked> Obstacles</label>
                <label><input type="checkbox" id="layer-nogo" checked> No-Go Zones</label>
                <label><input type="checkbox" id="layer-slow" checked> Slow Zones</label>
                <label><input type="checkbox" id="layer-restricted" checked> Restricted</label>
            </div>

            <div class="tool-group">
                <h3>Display Style</h3>
                <label><input type="checkbox" id="dotted-view"> Dotted View</label>
                <div id="dotted-params" style="display:none; margin-top:6px;">
                    <label style="display:block; margin-bottom:4px;">
                        Preset:
                        <select id="dot-preset" style="width:90px;">
                            <option value="balanced">Balanced</option>
                            <option value="balanced_plus">Balanced+</option>
                            <option value="quality">Quality</option>
                            <option value="speed">Speed</option>
                        </select>
                    </label>
                    <label style="display:block; margin-bottom:4px;">
                        Dot size:
                        <input type="number" id="dot-radius" value="2" min="1" max="6" step="1" style="width:40px;">
                        px
                    </label>
                    <label style="display:block; margin-bottom:4px;">
                        Marker:
                        <select id="dot-marker" style="width:70px;">
                            <option value="circle">Circle</option>
                            <option value="plus">Plus</option>
                        </select>
                    </label>
                </div>
            </div>

            <div class="tool-group stitch-group">
                <h3>Map Stitching</h3>
                <button class="action-btn stitch-load-btn" id="btn-stitch-map">Stitch Map</button>
                <input type="text" id="stitch-map-path" class="stitch-input" placeholder="/path/to/stitched_map.yaml">
                <button class="tool-btn stitch-tool-btn" data-tool="stitch-move" id="tool-stitch-move">Move Overlay</button>
                <div class="stitch-rotate-row">
                    <button class="tool-btn stitch-small-btn" id="btn-stitch-rotate-left" type="button">Rotate -2°</button>
                    <button class="tool-btn stitch-small-btn" id="btn-stitch-rotate-right" type="button">Rotate +2°</button>
                </div>
                <button class="tool-btn stitch-tool-btn" data-tool="stitch-region" id="tool-stitch-region">Region Matching</button>
                <button class="tool-btn stitch-tool-btn" data-tool="stitch-reference" id="tool-stitch-reference">Reference Points</button>
                <button class="action-btn stitch-secondary-btn" id="btn-apply-reference">Apply Reference Match</button>
                <button class="action-btn stitch-secondary-btn" id="btn-clear-reference">Clear Reference Pairs</button>
                <button class="action-btn success" id="btn-confirm-stitch">Confirm Placement</button>
                <button class="action-btn stitch-cancel-btn" id="btn-cancel-stitch">Cancel Stitch</button>
                <div class="stitch-meta">
                    <div id="stitch-state-label">State: idle</div>
                    <div id="stitch-mode-label">Alignment: --</div>
                    <div id="stitch-pairs-label">Pairs: 0</div>
                </div>
            </div>

            <div class="tool-group">
                <h3>Zoom</h3>
                <div class="zoom-controls">
                    <button class="tool-btn stitch-small-btn" id="btn-zoom-out" type="button">-</button>
                    <span id="zoom-label">100%</span>
                    <button class="tool-btn stitch-small-btn" id="btn-zoom-in" type="button">+</button>
                </div>
                <button class="tool-btn" id="btn-zoom-reset" type="button">Reset Zoom</button>
            </div>

            <div class="tool-group">
                <h3>Actions</h3>
                <button class="action-btn" id="btn-clear-obstacles">Clear Obstacles</button>
                <button class="action-btn" id="btn-clear-nogo">Clear No-Go</button>
                <button class="action-btn" id="btn-clear-slow">Clear Slow</button>
                <button class="action-btn" id="btn-clear-all">Clear All Layers</button>
                <button class="action-btn success" id="btn-export">Export Map</button>
            </div>
        </div>

        <div class="canvas-container">
            <div class="canvas-stage">
                <canvas id="map-canvas"></canvas>
            </div>
            <div class="coords-display" id="coords-display">X: -- Y: --</div>
            <div class="instructions" id="instructions">
                Select a tool to begin editing
            </div>
        </div>

        <div class="status-bar">
            <span id="status-text">Ready</span>
            <span id="object-count">Objects: 0</span>
        </div>
    </div>

    <script src="/static/js/map_editor.js"></script>
</body>
</html>
