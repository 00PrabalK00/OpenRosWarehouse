[tool.ruff]
# Target Python 3.10+ (ROS 2 Humble baseline)
target-version = "py310"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear (catches real bugs)
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line-too-long (handled by formatter)
    "B008",  # do not perform function calls in default arguments (ROS2 pattern)
    "B904",  # raise from inside except (too noisy until project adds chained exceptions)
    "SIM108", # ternary instead of if-else (readability preference)
]

[tool.ruff.lint.isort]
known-first-party = [
    "next_ros2ws_core",
    "next_ros2ws_web",
    "next_ros2ws_interfaces",
    "next_ros2ws_tools",
]
force-sort-within-sections = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"
