# Pre-commit hooks for the Next UGV workspace.
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
# Update hook versions: pre-commit autoupdate

default_language_version:
  python: python3

repos:
  # ─── General file hygiene ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-xml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch=main]

  # ─── Python: Ruff (replaces flake8 + isort + pyupgrade) ────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # ─── Python: type stubs (mypy in warn-only mode to avoid blocking CI) ───────
  # Uncomment when adding type annotations (PR3+):
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.10.0
  #   hooks:
  #     - id: mypy
  #       args: [--ignore-missing-imports, --warn-unreachable]

  # ─── C++: clang-format ──────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.5
    hooks:
      - id: clang-format
        types_or: [c, c++]
        args: [--style=file]

  # ─── Shell scripts ──────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
