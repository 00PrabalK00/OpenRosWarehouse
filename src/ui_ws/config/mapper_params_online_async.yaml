slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    # slam_toolbox consumes LaserScan only. Keep mapping on the raw front lidar
    # and reserve the true-union PointCloud2 for safety + UI visualization.
    scan_topic: /scan
    use_map_saver: true
    mode: mapping
    map_start_at_dock: false
    map_file_name: ""
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    min_laser_range: 0.3
    max_laser_range: 12.0
    # Publish/insert more responsively so live mapping updates don't feel delayed.
    # Keep these conservative enough to avoid painting heavy duplicate walls.
    minimum_time_interval: 0.08
    minimum_travel_distance: 0.04
    minimum_travel_heading: 0.05
    do_loop_closing: true
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02 #if 0 never publishes odometry
    # 5 s was making the live map feel frozen while driving.
    map_update_interval: 0.5
    resolution: 0.05
    transform_timeout: 0.2
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000 #// program needs a larger stack size to serialize large maps
    enable_interactive_mode: true

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: false
    # Queue a few scans so brief TF timing jitter does not freeze mapping.
    scan_queue_size: 20
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 8.0
    link_match_minimum_response_fine: 0.35
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 12           
    loop_match_maximum_variance_coarse: 2.5  
    loop_match_minimum_response_coarse: 0.40    
    loop_match_minimum_response_fine: 0.50

    # Correlation Parameters - Correlation Parameters
    correlation_search_space_dimension: 0.4
    correlation_search_space_resolution: 0.02
    correlation_search_space_smear_deviation: 0.05

    # Correlation Parameters - Loop Closure Parameters
    loop_search_space_dimension: 6.0
    loop_search_space_resolution: 0.06
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    fine_search_angle_offset: 0.00349     
    coarse_search_angle_offset: 0.2618
    coarse_angle_resolution: 0.0436
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.7
    use_response_expansion: true
