# ================================================================
# MASTER ROBOT CONFIGURATION — robot.yaml
# ================================================================
# Single operator-facing file for all tunable robot parameters.
# Edit here; no other config file needs to be touched for normal
# day-to-day tuning.
#
# Each top-level key is the ROS2 node name (matched at load-time).
# Nodes ignore sections that don't belong to them, so every launch
# file safely loads this entire file.
#
# Navigation controller (RPP) parameters live in:
#   config/nav2_params.yaml  →  controller_server.ros__parameters
# Those are kept there because Nav2 has many interdependent params.
# ================================================================


# ---------------------------------------------------------------
# SAFETY CONTROLLER — obstacle detection and emergency stop
# ---------------------------------------------------------------
scan_merger:
  ros__parameters:
    # Keep merged scans in the same 2D base frame used by EKF and SLAM.
    output_frame: base_footprint
    # Publish a true-union PointCloud2 alongside the compatibility LaserScan.
    output_cloud_topic: scan_combined_cloud
    # Treat the merged scan as a synthetic near-now scan.
    output_stamp_mode: now
    # Publish immediately on fresh lidar input, but cap merge frequency so
    # dual-lidar pairing does not pin the robot CPU.
    publish_on_input: true
    publish_min_interval_sec: 0.06
    watchdog_period_sec: 0.25
    # Preserve full coverage from both lidars in the merged scan.
    ownership_split_enabled: false
    # Only used if ownership_split_enabled is turned back on.
    side_overlap_angle_rad: 0.35
    # Light downsampling: reduce density without losing wall boundaries.
    angular_downsample_factor: 1
    # After each lidar is projected into base_footprint, nearby bins can get
    # skipped just from resampling. Fill only very small angular gaps where the
    # neighboring ranges still agree, so merged walls stay dense without
    # bridging real openings.
    angular_gap_fill_enabled: true
    angular_gap_fill_max_bins: 3
    angular_gap_fill_max_range_delta_m: 0.22
    # Each raw beam covers a small angular footprint once shifted from the
    # lidar origin into base_footprint. Stamp that tiny footprint into a couple
    # neighboring bins so the merged scan does not look artificially sparse.
    beam_footprint_fill_enabled: true
    beam_footprint_fill_max_bins: 2
    # Drop only isolated bins that do not have nearby range support.
    isolated_point_filter_enabled: false
    isolated_point_filter_window_bins: 2
    isolated_point_filter_range_delta_m: 0.18
    isolated_point_filter_min_support: 1
    # Prefer timestamp-matched front/rear pairs before merging.
    approximate_sync_enabled: true
    max_pair_stamp_diff_sec: 0.04
    unmatched_scan_timeout_sec: 0.14
    allow_partial_fallback: true
    sync_queue_size: 8

# ---------------------------------------------------------------
# SAFETY CONTROLLER — obstacle detection and emergency stop
# ---------------------------------------------------------------
safety_controller:
  ros__parameters:
    # Upstream cmd_vel (output of twist_mux)
    cmd_vel_input_topic: /cmd_vel_mux_out
    # Downstream cmd_vel going to wheel driver (overridden in sim launch).
    cmd_vel_output_topic: /wheel_controller/cmd_vel_unstamped

    # Master switch for distance-based obstacle safety in both manual and autonomous modes.
    # This is the single on/off authority for obstacle distance/TTC stop and slowdown.
    distance_safety_enabled: true

    # Debug mode: bypass the merged cloud and let safety use raw /scan + /scan2 directly.
    obstacle_cloud_topic: /scan_combined_cloud_disabled
    obstacle_prefer_cloud_timeout_sec: 0.35
    obstacle_scan_topic: ''
    obstacle_prefer_combined_timeout_sec: 0.35

    # Direction-aware obstacle checks.
    obstacle_use_directional_blocking: true
    # Use the same obstacle gate behavior in manual and autonomous driving.
    manual_mode_same_obstacle_gate: true
    # In manual mode, once a gate closes in the direction you were pushing,
    # keep the opposite direction available as an escape path.
    manual_directional_escape_enabled: true
    # Run the safety controller as a hard gate, not an advisory slowdown layer:
    # commands either pass through or are fully blocked.
    obstacle_gate_strict_stop_only: true
    # Absolute close-range stop distance for the hard gate.
    obstacle_hard_stop_distance_m: 0.3
    obstacle_forward_half_angle_deg: 70.0
    obstacle_rear_half_angle_deg: 70.0
    obstacle_min_points: 4
    obstacle_stop_confirm_frames: 2
    obstacle_clear_confirm_frames: 3
    obstacle_clear_margin_m: 0.15

    # Time-to-collision gating for the hard gate.
    ttc_stop_sec: 1.10                  # was 0.90 — stops further away in autonomous
    ttc_warn_sec: 1.80                  # was 1.60
    ttc_min_speed_mps: 0.05
    obstacle_ttc_min_distance_m: 0.3   # keep TTC gate aligned with the hard-stop distance

    # No advisory slowdown layer: the gate either passes commands or blocks them.
    obstacle_slowdown_enabled: false
    obstacle_slowdown_min_scale: 0.0    # was 0.25 — now fully stops instead of creeping
    obstacle_slowdown_distance_buffer_m: 0.25
    obstacle_slowdown_ttc_buffer_sec: 0.70

    # Keep the legacy manual-only threshold aligned with the hard gate distance.
    manual_critical_zone_m: 0.3
    autonomous_critical_zone_m: 0.3
    robot_base_frame: base_footprint

    # Robot body echo filtering.
    obstacle_valid_min_range: 0.14
    obstacle_median_window: 5
    # Match the physical body envelope closely enough to suppress self-echoes
    # from the chassis, wheels, and casters without changing Nav2/costmaps.
    robot_body_length_m: 0.80
    robot_body_width_m: 0.72
    obstacle_body_padding_m: 0.06
    obstacle_body_exclusion_radius_m: 0.22
    # Raw lidars sit in recessed body pockets. Ignore only near off-axis
    # pocket echoes, while still allowing close straight-ahead obstacles.
    raw_scan_self_echo_range_m: 0.18
    raw_scan_opening_half_angle_deg: 42.0


# ---------------------------------------------------------------
# NAV2 COSTMAP FILTER BRIDGE — static zones + live safety overlays
# ---------------------------------------------------------------
keepout_zone_publisher:
  ros__parameters:
    enable_speed_filter: false
    max_speed_mps: 1.5
    publish_rate_hz: 10.0
    dynamic_safety_filters_enabled: true
    robot_base_frame: base_footprint
    dynamic_keepout_radius_m: 0.35
    dynamic_keepout_front_offset_m: 0.55
    dynamic_keepout_rear_offset_m: 0.55
    dynamic_speed_filter_radius_m: 0.45
    dynamic_pose_yaw_bin_deg: 8.0


# ---------------------------------------------------------------
# JOYSTICK — hardware and teleop axis/button mapping
# ---------------------------------------------------------------
joy_node:
  ros__parameters:
    device_id       : 0      # /dev/input/js<N>
    deadzone        : 0.05   # ignore stick noise below this fraction
    autorepeat_rate : 20.0   # keep publishing while held so brief safety gating does not require button re-presses

teleop_node:
  ros__parameters:
    # Linear (forward / back)
    axis_linear.x        : 1       # stick axis index
    scale_linear.x: 1.5     # normal mode max speed (m/s)
    scale_linear_turbo.x: 1.5     # turbo mode max speed (m/s)
    # Angular (yaw / turn)
    axis_angular.yaw        : 0    # stick axis index
    scale_angular.yaw: 1.5  # normal mode max turn rate (rad/s)
    scale_angular_turbo.yaw: 1.5  # turbo mode max turn rate (rad/s)
    # Buttons (0-indexed per controller layout)
    enable_button        : 6       # deadman — must hold to drive
    enable_turbo_button  : 7       # hold for turbo speed


# ---------------------------------------------------------------
# ZONE MANAGER — autonomous navigation behaviour
# ---------------------------------------------------------------
zone_manager:
  ros__parameters:
    # ---- Nav2 runtime speed cap ----
    # This is pushed to controller_server/desired_linear_vel at runtime by the UI's
    # /set_max_speed service. Must match (or be <= ) desired_linear_vel in nav2_params.yaml.
    default_max_speed: 1.5   # m/s

    # ---- Zone arrival tolerances ----
    # How close the robot must be to call a GoToZone 'arrived'.
    zone_position_tolerance            : 0.10   # m  matched to Nav2 xy_goal_tolerance; diagnostic only
    zone_heading_tolerance             : 0.12   # rad  final bearing tolerance
    zone_two_stage_arrival             : false  # legacy: ZoneManager no longer overrides Nav2 success
    zone_two_stage_heading_min_error   : 0.05   # rad  legacy/no-op with Nav2-authoritative success
    # Accept Nav2 SUCCEEDED even if base_link overshot by up to this.
    zone_nav2_success_max_mismatch_distance : 0.10  # m  legacy diagnostic only; Nav2 success is authoritative
    goal_pose_handoff_standoff_distance : 0.55  # m  first stage for shelf/current-goal handoff before final center entry
    goal_pose_handoff_approach_arrival_tolerance : 0.20  # m  acceptable miss distance at the ghost approach point before shelf insert starts
    goal_pose_handoff_local_insert_enabled : true
    goal_pose_handoff_local_insert_safety_override_enabled : false  # keep shelf insertion independent from safety override
    goal_pose_handoff_local_insert_speed : 0.05              # m/s  minimum speed (final few cm)
    goal_pose_handoff_local_insert_max_speed : 0.10          # m/s  cruise speed cap — slow entry for accuracy
    goal_pose_handoff_local_insert_max_turn : 0.55           # rad/s  keep insertion steering controlled
    goal_pose_handoff_local_insert_bearing_gain : 2.2        # steer toward shelf centerline
    goal_pose_handoff_local_insert_final_heading_gain : 0.60 # keep body aligned to shelf heading
    goal_pose_handoff_local_insert_lateral_gain : 0.7        # how hard controller steers to null lateral error during straight-in (lower = straighter path, more residual offset; higher = more centered, more diagonal)
    goal_pose_handoff_local_insert_heading_tolerance : 0.08  # rad  final heading acceptance
    goal_pose_handoff_local_insert_prealign_heading_tolerance : 0.06  # rad before forward creep begins
    goal_pose_handoff_local_insert_realign_heading_tolerance : 0.35   # rad  only fall back to re-align if error gets clearly worse
    goal_pose_handoff_local_insert_align_deadband : 0.04              # rad  stop micro-correcting when nearly aligned
    goal_pose_handoff_local_insert_align_hold_samples : 3             # samples  require stable heading before straight-in
    goal_pose_handoff_local_insert_align_stable_delta : 0.04          # rad  consecutive aligned samples must stay this close
    goal_pose_handoff_local_insert_align_max_turn : 0.22             # rad/s softer align turn to avoid no-no jitter
    goal_pose_handoff_local_insert_position_tolerance : 0.05 # m  center arrival tolerance
    goal_pose_handoff_local_insert_distance : 0.50           # m  distance from inner shelf target back to the shelf opening centerline
    goal_pose_handoff_local_insert_centerline_tolerance : 0.05         # m  acceptable lateral offset at center
    goal_pose_handoff_local_insert_centerline_slowdown_tolerance : 0.10 # m  slow/rotate if wider than this
    goal_pose_handoff_local_insert_timeout_sec : 15.0             # hard cap: abort if insertion takes longer than this
    goal_pose_handoff_local_insert_no_progress_timeout_sec : 5.0  # abort if no forward/heading progress for this long
    goal_pose_handoff_local_insert_progress_epsilon_m : 0.005
    goal_pose_handoff_local_insert_loop_hz : 15.0
    goal_pose_handoff_retry_attempts : 3
    goal_pose_handoff_retry_delay_sec : 0.75
    goal_pose_handoff_min_hotspot_count : 3        # do not use raw 2-reflector solves for final shelf handoff/insertion
    goal_pose_handoff_live_geometry_enabled : true
    goal_pose_handoff_live_trim_enabled : true
    goal_pose_handoff_live_trim_gain : 0.8
    goal_pose_handoff_live_trim_max_turn : 0.12
    goal_pose_handoff_local_insert_max_live_yaw_jump : 0.25          # rad (~14 deg) — reject live yaw flips beyond this from initial heading
    goal_pose_handoff_local_insert_max_final_heading_correction : 0.30  # rad (~17 deg) — if larger, skip final spin and accept
    goal_pose_handoff_intensity_balance_enabled : true
    goal_pose_handoff_intensity_balance_tolerance : 0.22      # ratio 0=equal, larger = more forgiving midpoint stop
    goal_pose_handoff_intensity_balance_min_pair_sum : 35.0   # minimum summed reflector intensity per front/back pair
    goal_pose_handoff_intensity_balance_required_samples : 3  # consecutive fresh shelf samples before stopping
    goal_pose_handoff_intensity_balance_freshness_sec : 0.60  # stale status ignored for midpoint stop
    goal_pose_handoff_intensity_balance_min_travel_m : 0.12   # avoid stopping immediately at the shelf opening
    shelf_detector_enable_service : /shelf/set_enabled
    follow_path_shelf_check_timeout_sec : 3.0
    follow_path_shelf_check_enable_settle_sec : 0.20
    follow_path_shelf_check_poll_sec : 0.10
    follow_path_shelf_docking_speed_cap : 0.10     # m/s cap for post-arrival shelf docking
    # Verify disabled: live LiDAR detection inside the shelf flips yaw 180°
    # (robot now closer to back wall → near/far swap → reversed heading).
    # That causes the correction loop to spin 180° × 2 corrections = 360°.
    # Insertion already lands within tight tolerances (0.05m pos, 0.05m lat).
    goal_pose_handoff_verify_enabled : false
    goal_pose_handoff_verify_wait_timeout_sec : 1.20
    goal_pose_handoff_verify_poll_sec : 0.05
    goal_pose_handoff_verify_max_corrections : 2
    goal_pose_handoff_verify_correction_timeout_sec : 0.0        # 0 disables timeout; let pre-insert centering finish accurately
    goal_pose_handoff_verify_no_progress_timeout_sec : 0.0       # 0 disables no-progress abort for slow centering moves
    # Robot footprint polygon -- VISUAL display only, not used for physical clearance.
    zone_arrival_footprint_polygon     : '[[0.40, 0.37], [0.40, -0.37], [-0.40, -0.37], [-0.40, 0.37]]'
    zone_arrival_footprint_padding     : 0.02   # m  extra margin beyond polygon (visual)
    # Shelf entry clearance -- sourced from URDF (physical truth).
    # chassis_width=0.58m → half=0.29m.  Margin adds safety buffer each side.
    goal_pose_handoff_footprint_half_width  : 0.29   # m  URDF chassis half-width
    goal_pose_handoff_opening_width_margin  : 0.02   # m  per-side clearance buffer → required = 0.62m
    # Maximum time for on-zone actions (e.g. lift up/down).
    zone_action_timeout_s              : 45.0   # s

    # ---- Path-follow retry policy ----
    path_max_retries                   : 20     # attempts before FollowPath fails
    path_retry_on_aborted              : true   # retry ABORTED phases too; keep path/heading convergence persistent
    nav_goal_accept_attempts           : 20     # attempts to resend a rejected Nav2 goal before failing

    # ---- No-progress watchdog ----
    # If the robot doesn't move for this long, the path is aborted.
    path_no_progress_timeout_sec           : 8.0   # s
    path_no_progress_min_speed_mps         : 0.02  # m/s  "moving" threshold
    path_no_progress_min_distance_delta_m  : 0.03  # m    position delta threshold

    # ---- Waypoint tolerances ----
    path_waypoint_tolerance            : 0.10   # m  matched to Nav2 xy_goal_tolerance; diagnostic/helper only
    path_nav2_success_max_mismatch_distance : 0.10   # m  legacy diagnostic only; Nav2 success is authoritative
    path_final_tolerance               : 0.10   # m  matched to Nav2 xy_goal_tolerance; diagnostic/helper only
    path_heading_tolerance             : 0.20   # rad
    # How long to wait (seconds) after Nav2 reports SUCCEEDED before reading the
    # robot heading / position for alignment checks.  Nav2 declares success while
    # the robot is still decelerating; evaluating heading during this coast phase
    # produces inconsistent results and may skip alignment prematurely.
    # Increase if the robot is still visibly moving when alignment starts.
    # Set to 0.0 to disable (not recommended on real hardware).
    path_arrival_settle_sec            : 0.35   # s
    # Legacy/no-op: ALIGN_AT_POINT now reuses the Nav2 controller instead of /spin.
    path_align_spin_time_allowance_sec : 12.0   # s
    # Stable-heading gate: number of consecutive heading samples required to ALL
    # be within zone_heading_tolerance before alignment is accepted.
    # Prevents a transient mid-spin pass-through from falsely clearing the check.
    path_align_stable_samples          : 3      # readings (spaced by interval below)
    # Time between consecutive stable-heading samples (seconds).
    # Total validation window = samples * interval (e.g. 3 * 0.10s = 0.30s window).
    path_align_stable_interval_sec     : 0.10   # s
    path_enforce_waypoint_orientation  : false  # do not force heading at every waypoint
    path_align_intermediate_waypoints  : false  # keep rolling through intermediate anchors
    path_require_final_heading         : false  # final heading comes only from POI semantics
    path_follow_segment_spacing        : 0.15   # m

    # ---- Corridor enforcement ----
    # When enabled, aborts navigation if robot strays outside the corridor.
    path_enforce_corridor                  : false
    path_corridor_width                    : 0.30   # m  half-width each side of path
    path_corridor_arm_tolerance            : 0.45   # m  soft warning before abort
    path_corridor_violation_confirm_cycles : 4      # timer ticks to confirm breach

    # ---- Curve leniency ----
    # On curved segments the corridor and orientation checks are relaxed.
    path_curve_motion_leniency_enabled    : true
    path_curve_segment_spacing            : 0.12   # m  keep curved segments close to drawn path
    path_curve_relax_waypoint_orientation : false
    path_curve_turn_threshold_deg         : 12.0   # deg  angle change = "curve"

    # ---- Entry / start behaviour ----
    path_force_first_waypoint_entry       : true   # must pass through first point
    path_nearest_start_enabled            : false  # start from nearest point on path
    path_require_pose_in_path_frame       : true
    path_require_close_start              : false
    path_require_close_start_distance     : 0.30   # m


# ---------------------------------------------------------------
# SHELF GEOMETRIC REFINER + VALIDATOR
# Staged geometric pipeline (Zhao et al. 2024).
# Sits after shelf_detector, before zone_manager.
# zone_manager reads /shelf/refined_status_json (output topic).
# ---------------------------------------------------------------
shelf_geometric_refiner:
  ros__parameters:
    # Topics
    input_status_topic  : /shelf/status_json
    output_status_topic : /shelf/refined_status_json
    scan_topic          : /scan
    base_frame          : base_link

    # Shelf physical model (L = depth, W = opening width)
    # Tune to match your physical shelf dimensions.
    shelf_model_length_m         : 0.90   # m  depth of shelf (L)
    shelf_model_width_m          : 0.71   # m  opening width (W)  ← matches log "width=0.71m"
    shelf_model_leg_h_m          : 0.04   # m  reflector leg size along shelf axis
    shelf_model_leg_w_m          : 0.04   # m  reflector leg size across shelf axis
    shelf_model_leg_is_circular  : false  # true for round tubes

    # Stage B — ROI and clustering
    roi_radius_m          : 0.75   # m  local window around rough pose
    cluster_adj_dist_m    : 0.10   # m  max gap between adjacent scan points in same cluster
    cluster_min_points    : 2      # min returns per leg cluster
    cluster_max_extent_m  : 0.20   # m  max spatial extent of one leg cluster
    trailing_min_beta_deg : 15.0   # deg  trailing-point filter threshold (paper eq. 1)

    # Stage C/D — geometric + model tolerance
    model_length_tolerance_m : 0.18   # m  allowed error on L measurement
    model_width_tolerance_m  : 0.18   # m  allowed error on W measurement
    min_legs_for_validation  : 3      # 3 = right-triangle fallback, 4 = full rectangle

    # Refinement acceptance (reject outlier NLS solutions)
    max_pose_residual_accept_m  : 0.06   # m  maximum RMS residual of shelf-pose NLS
    max_model_error_accept_m    : 0.12   # m  maximum total L+W model fit error

    # Input data freshness
    scan_max_age_sec : 0.40   # s  discard cached scan older than this

    # Proximity guard — skip pipeline when shelf centre is this close to the
    # robot (robot is inside or directly under the shelf, scanner sees back
    # legs).  Must be > half the shelf length (0.90 / 2 = 0.45 m) to catch
    # worst-case centroid when only back legs are visible.
    min_rough_pose_distance_m : 0.40   # m  (default 0.40 m)

    # Yaw sanity check — reject NLS result if it diverges more than this
    # from the detector's heading.  Guards against 180° flip when only back
    # legs are in view.
    max_refined_yaw_delta_deg : 45.0   # deg  (default 45°)

    # Temporal stability (Stage G repeated-recognition)
    temporal_window_size  : 8      # number of recent poses to keep
    temporal_pos_tol_m    : 0.025  # m  position consistency window
    temporal_yaw_tol_deg  : 3.0    # deg  heading consistency window


# ---------------------------------------------------------------
# STACK MANAGER — navigation / SLAM process lifecycle
# ---------------------------------------------------------------
stack_manager:
  ros__parameters:
    # What to do at boot:
    #   nav   = start navigation immediately (requires a loaded map)
    #   slam  = start SLAM mapping
    #   stop  = do nothing, wait for UI command
    #   empty = bring up empty costmap only
    startup_mode : stop
