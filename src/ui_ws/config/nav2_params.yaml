amcl:
  ros__parameters:
    use_sim_time: false
    
    # Auto-initialize at robot spawn position
    #set_initial_pose: true
    #initial_pose_x: 0.0
    #initial_pose_y: 0.0
    #initial_pose_a: 0.0
    
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    # Tune laser ranges to match LiDAR hardware (improves AMCL stability)
    laser_max_range: 12.0
    laser_min_range: 0.3
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 0.3
    update_min_a: 0.15
    update_min_d: 0.15
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    # Use the front lidar only for localization/navigation stability.
    # Dual-lidar coverage stays reserved for safety checks and auto-reloc.
    scan_topic: "/scan"

amcl_map_client:
  ros__parameters:
    use_sim_time: false

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: false


bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: "map"
    robot_base_frame: "base_link"

    # Real robot uses EKF-filtered odometry; /diff_cont/odom is Gazebo-only.
    odom_topic: "/odometry/filtered"

    # Behavior trees with recovery behaviors
    # Behavior trees with recovery behaviors
    # BT XML paths are rewritten at launch time via RewrittenYaml in nav2_bringup_wrapper.launch.py.
    # These defaults are placeholders; override via 'bt_xml' launch arg or the wrapper launch.
    default_nav_to_pose_bt_xml: ""
    # Through-poses BT with passed-goal pruning for smooth waypoint traversal
    default_nav_through_poses_bt_xml: "navigate_through_poses_simple.xml"
    
    # Make recovery behaviors optional - don't fail if they have issues
    always_reload_bt_xml: false
    bt_loop_duration: 10
    default_server_timeout: 20
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: false


controller_server:
  ros__parameters:
    use_sim_time: false
    # Controller feedback must come from the EKF odom stream, not Nav2's
    # default /odom placeholder, otherwise acceleration limiting uses stale
    # or missing velocity feedback.
    odom_topic: "/odometry/filtered"
    controller_frequency: 20.0  # Increased from 10.0 for faster emergency response
    min_x_velocity_threshold: 0.001
    # Differential-drive base: suppress lateral (y) velocity noise.
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugin: "goal_checker"
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      # Keep no-progress response quick so navigation retries within seconds,
      # not after long idle pauses.
      movement_time_allowance: 8.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.12
      stateful: false

    FollowPath:
      # Single controller profile for all Nav2 motion intents.
      plugin: "next_nav2_controller::NextNav2Controller"
      control_mode: "rpp"
      max_v: 0.50
      max_w: 0.55
      acc_lim_v: 2.5
      # decel_lim_v: separate deceleration limit for braking profile.
      # Real robots decelerate faster than they accelerate — set lower than acc_lim_v
      # so the velocity profile backward pass leaves enough stopping distance.
      decel_lim_v: 1.5
      acc_lim_w: 1.5
      allow_reverse: false
      enforce_diff_drive_kinematics: true
      wheel_separation: 0.51
      max_wheel_linear_speed: 1.25
      min_tracking_speed: 0.05
      min_cruise_speed: 0.40
      lookahead_distance: 0.70
      lookahead_speed_gain: 0.0
      lookahead_min_distance: 0.70
      lookahead_max_distance: 0.70
      rpp_use_velocity_scaled_lookahead: false
      segment_finish_epsilon: 0.04
      transform_tolerance: 0.25
      final_approach_distance: 0.8
      rpp_desired_linear_vel: 0.50
      rpp_use_collision_detection: false
      rpp_max_allowed_time_to_collision: 1.0
      rpp_regulated_linear_scaling_min_radius: 0.50
      rpp_regulated_linear_scaling_min_speed: 0.08
      rpp_segment_lookahead_turn_threshold: 0.20
      rpp_use_rotate_to_heading: true
      rpp_rotate_to_heading_min_angle: 0.20
      rpp_rotate_to_heading_exit_angle: 0.10
      rpp_rotate_to_heading_angular_vel: 0.45
      rotate_in_place_max_v: 0.0
      strict_line_tracking: true
      strict_line_adaptive_lateral_limit: true
      # Corridor is sized to the chassis half-width (0.58 m wide / 2 = 0.29 m).
      # As long as the robot center is within ±0.29 m of the line the robot
      # footprint is considered inside the corridor; the controller stops
      # fighting small lateral errors, which is much smoother.
      strict_line_max_lateral_error: 0.29
      strict_line_max_lateral_growth: 0.02
      strict_line_adaptive_max_limit: 0.29
      strict_line_capture_lateral_error: 0.29
      strict_line_release_lateral_error: 0.40
      # Speed slowdown only kicks in when the robot footprint starts sticking
      # out past the corridor (i.e. lateral_error at the half-width edge).
      strict_line_speed_slowdown_error: 0.29
      strict_line_min_speed_scale: 0.15
      strict_line_k_heading: 0.6
      strict_line_k_lateral: 0.45
      # Segment speed profile: floor at cruise speed so per-segment curvature
      # limits cannot push cruise below the driver-set floor. Raising the
      # lateral-accel cap lets the profile accept the 0.40 floor on mildly
      # curved drawn paths instead of flooring at the default 0.15 m/s.
      speed_profile_enabled: true
      speed_profile_max_lateral_accel: 1.5
      speed_profile_min_speed: 0.40
      rpp_collision_check_resolution: 0.05
      # Re-transform the plan from map→odom every 0.5 s so poses stay fresh
      # in the TF buffer (avoids "extrapolation into the past" stalls).
      plan_refresh_period: 0.5
      allow_degenerate_segment_fallback: true
      path_max_drop_fraction: 0.10
      control_point_offset_x: 0.0
      control_point_offset_y: 0.0
      debug_publishers: false
      # Stall/block detection: throw PlannerException (ABORTED) quickly so
      # zone_manager retries with a fresh plan rather than waiting 8s for
      # Nav2's SimpleProgressChecker to fire.
      progress_stall_timeout: 4.0
      abort_on_progress_stall: true
      blocked_timeout: 3.0
      abort_on_blocked_timeout: true

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: "odom"
      robot_base_frame: "base_link"
      rolling_window: true

      width: 10
      height: 10
      resolution: 0.05

      # Use explicit footprint (base_link-centered) instead of a too-small circle.
      # Derived from robot_core.xacro geometry:
      # chassis: 0.80 x 0.58 m, wheel outer width ~= 0.71 m.
      footprint: "[[0.40, 0.37], [0.40, -0.37], [-0.40, -0.37], [-0.40, 0.37]]"
      footprint_padding: 0.02
      update_frequency: 10.0
      publish_frequency: 5.0

      plugins: ["voxel_layer", "inflation_layer", "keepout_filter"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        observation_sources: "scan"
        scan:
          topic: "/scan"
          data_type: "LaserScan"
          marking: true
          clearing: true
          footprint_clearing_enabled: true
          max_obstacle_height: 2.0
          obstacle_min_range: 0.25
          obstacle_max_range: 8.0
          raytrace_min_range: 0.25
          raytrace_max_range: 10.0
          observation_persistence: 0.0
          expected_update_rate: 0.0
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Local inflation matched to controller lookahead (0.70 m) so the controller
        # sees the full inflation gradient along its intended arc before committing.
        # Global costmap keeps a larger 1.0 m inflation to bias global plans away
        # from walls without starving the controller's reaction distance.
        inflation_radius: 0.7
        cost_scaling_factor: 3.0
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"
        transform_tolerance: 0.1

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 3.0
      publish_frequency: 1.0

      origin_x: -7.02
      origin_y: -10.4

      global_frame: "map"
      robot_base_frame: "base_link"

      # Keep global/local footprint consistent with physical robot envelope.
      footprint: "[[0.40, 0.37], [0.40, -0.37], [-0.40, -0.37], [-0.40, 0.37]]"
      footprint_padding: 0.02
      width: 25
      height: 25
      resolution: 0.05
      track_unknown_space: true

      plugins: ["static_layer", "obstacle_layer", "inflation_layer", "keepout_filter"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: "scan"
        scan:
          topic: "/scan"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          footprint_clearing_enabled: true
          data_type: "LaserScan"
          obstacle_min_range: 0.25
          obstacle_max_range: 8.0
          raytrace_min_range: 0.25
          raytrace_max_range: 10.0
          observation_persistence: 0.0
          expected_update_rate: 0.0
          inf_is_valid: false

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Match local costmap inflation so global plans also respect a larger
        # safety buffer around the robot envelope.
        inflation_radius: 1.0
        cost_scaling_factor: 3.0

      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"
        transform_tolerance: 0.1

      always_send_full_costmap: true

  global_costmap_client:
    ros__parameters:
      use_sim_time: false

  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false


map_server:
  ros__parameters:
    use_sim_time: false
    # yaml_filename is injected at launch time from active_map_config.yaml via nav2_bringup_wrapper.
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5000
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: false


planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.10
      use_astar: true
      allow_unknown: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false


behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    
    # Behavior plugins with full parameters
    behavior_plugins: ["wait"]

    wait:
      plugin: "nav2_behaviors/Wait"

    # Transform and frame settings
    global_frame: "odom"
    robot_base_frame: "base_link"
    transform_tolerance: 0.1
    
    # Velocity limits for behaviors
    max_rotational_vel: 0.55
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.5

behavior_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false


waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 0


lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names: ["map_server", "amcl"]
    bond_timeout: 10.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0


lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - "controller_server"
      - "planner_server"
      - "behavior_server"
      - "bt_navigator"
      - "waypoint_follower"
    bond_timeout: 10.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0


robot_state_publisher:
  ros__parameters:
    use_sim_time: false
