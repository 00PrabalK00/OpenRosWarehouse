amcl:
  ros__parameters:
    use_sim_time: false
    # Trust the EKF / wheel odom more so AMCL does not keep re-spreading the
    # particle cloud aggressively during in-place turns and snapping back.
    alpha1: 0.05
    alpha2: 0.05
    alpha3: 0.03
    alpha4: 0.05
    alpha5: 0.03
    base_frame_id: base_footprint
    beam_skip_distance: 0.4
    beam_skip_error_threshold: 0.8
    beam_skip_threshold: 0.5
    # Combined dual-lidar scans can have partial mismatch while rotating.
    # Enable beam skipping so a bad slice of the scan does not yank heading.
    do_beamskip: true
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 1.5
    laser_max_range: 12.0
    laser_min_range: 0.3
    laser_model_type: likelihood_field
    max_beams: 100
    max_particles: 2000
    min_particles: 500
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 3
    robot_model_type: nav2_amcl::DifferentialMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.12
    tf_broadcast: true
    transform_tolerance: 0.5
    # For this robot/environment, pure rotation is where AMCL is going unstable.
    # Make it rely on odom through turns and only apply scan corrections after a
    # much larger heading change.
    update_min_a: 1.10
    update_min_d: 0.10
    z_hit: 0.75
    z_max: 0.05
    z_rand: 0.20
    z_short: 0.05
    # Keep AMCL on a raw single-lidar topic instead of the synthetic merged scan.
    scan_topic: /scan
amcl_map_client:
  ros__parameters:
    use_sim_time: false
amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: false
bt_navigator:
