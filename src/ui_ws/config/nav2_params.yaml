controller_server:
  ros__parameters:
    use_sim_time: false
    odom_topic: /odometry/filtered
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0
    progress_checker_plugin: progress_checker
    goal_checker_plugin: goal_checker
    controller_plugins:
    - FollowPath
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.05
      movement_time_allowance: 8.0
    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.12
      stateful: false
    FollowPath:
      plugin: next_nav2_controller::NextNav2Controller
      control_mode: rpp
      max_v: 0.5
      max_w: 0.55
      acc_lim_v: 2.5
      decel_lim_v: 1.5
      acc_lim_w: 1.5
      allow_reverse: false
      enforce_diff_drive_kinematics: true
      wheel_separation: 0.51
      max_wheel_linear_speed: 1.25
      min_tracking_speed: 0.05
      min_cruise_speed: 0.4
      lookahead_distance: 0.7
      lookahead_speed_gain: 0.0
      lookahead_min_distance: 0.7
      lookahead_max_distance: 0.7
      rpp_use_velocity_scaled_lookahead: false
      segment_finish_epsilon: 0.04
      transform_tolerance: 0.25
      final_approach_distance: 0.8
      rpp_desired_linear_vel: 0.5
      rpp_use_collision_detection: false
      rpp_max_allowed_time_to_collision: 1.0
      rpp_regulated_linear_scaling_min_radius: 0.5
      rpp_regulated_linear_scaling_min_speed: 0.08
      rpp_segment_lookahead_turn_threshold: 0.2
      rpp_use_rotate_to_heading: true
      rpp_rotate_to_heading_min_angle: 0.2
      rpp_rotate_to_heading_exit_angle: 0.1
      rpp_rotate_to_heading_angular_vel: 0.45
      rotate_in_place_max_v: 0.0
      strict_line_tracking: true
      strict_line_adaptive_lateral_limit: true
      strict_line_max_lateral_error: 0.29
      strict_line_max_lateral_growth: 0.02
      strict_line_adaptive_max_limit: 0.29
      strict_line_capture_lateral_error: 0.29
      strict_line_release_lateral_error: 0.4
      strict_line_speed_slowdown_error: 0.29
      strict_line_min_speed_scale: 0.15
      strict_line_k_heading: 0.6
      strict_line_k_lateral: 0.45
      speed_profile_enabled: true
      speed_profile_max_lateral_accel: 1.5
      speed_profile_min_speed: 0.4
      rpp_collision_check_resolution: 0.05
      plan_refresh_period: 0.5
      allow_degenerate_segment_fallback: true
      path_max_drop_fraction: 0.1
      control_point_offset_x: 0.0
      control_point_offset_y: 0.0
      debug_publishers: false
      progress_stall_timeout: 4.0
      abort_on_progress_stall: true
      blocked_timeout: 3.0
      abort_on_blocked_timeout: true
controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      footprint: '[]'
      footprint_padding: 0.0
      update_frequency: 10.0
      publish_frequency: 5.0
      plugins:
      - voxel_layer
      - inflation_layer
      - keepout_filter
      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true
          footprint_clearing_enabled: true
          max_obstacle_height: 2.0
          obstacle_min_range: 0.25
          obstacle_max_range: 8.0
          raytrace_min_range: 0.25
          raytrace_max_range: 10.0
          observation_persistence: 0.0
          expected_update_rate: 0.0
          inf_is_valid: false
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.7
        cost_scaling_factor: 3.0
      keepout_filter:
        plugin: nav2_costmap_2d::KeepoutFilter
        enabled: true
        filter_info_topic: /costmap_filter_info
        transform_tolerance: 0.1
      robot_radius: 0.3
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 3.0
      publish_frequency: 1.0
      origin_x: -7.02
      origin_y: -10.4
      global_frame: map
      robot_base_frame: base_footprint
      footprint: '[]'
      footprint_padding: 0.0
      width: 25
      height: 25
      resolution: 0.05
      track_unknown_space: true
      plugins:
      - static_layer
      - obstacle_layer
      - inflation_layer
      - keepout_filter
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          footprint_clearing_enabled: true
          data_type: LaserScan
          obstacle_min_range: 0.25
          obstacle_max_range: 8.0
          raytrace_min_range: 0.25
          raytrace_max_range: 10.0
          observation_persistence: 0.0
          expected_update_rate: 0.0
          inf_is_valid: false
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 1.0
        cost_scaling_factor: 3.0
      keepout_filter:
        plugin: nav2_costmap_2d::KeepoutFilter
        enabled: true
        filter_info_topic: /costmap_filter_info
        transform_tolerance: 0.1
      always_send_full_costmap: true
      robot_radius: 0.3
  global_costmap_client:
    ros__parameters:
      use_sim_time: false
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ''
map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5000
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: false
