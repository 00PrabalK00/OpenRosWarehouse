                    offsetY: state.view.offsetY
                };
                syncCanvasCursor();
                updateStatus("Panning map view");
                return;
            }

            if (state.tool === "measure") {
                handleMeasureClick(mapPos);
                cancelPointerInteraction(e);
                return;
            }

            if (Object.prototype.hasOwnProperty.call(TOOL_ZONE_PRESETS, state.tool)) {
                saveZoneFromTool(state.tool, worldPos);
                cancelPointerInteraction(e);
                return;
            }

            if (state.moveOriginEnabled) {
                const originCanvas = mapPixelToCanvas(state.originPx, state.originPy);
                const dx = p.x - originCanvas.x;
                const dy = p.y - originCanvas.y;
                if (dx * dx + dy * dy <= 18 * 18) {
                    state.draggingOrigin = true;
                    syncCanvasCursor();
                    updateStatus("Moving origin");
                    return;
                }
            }

            if (state.tool === "move_zone") {
                const hit = hitTestZone(p.x, p.y);
                if (!hit) return;
                state.draggingZoneId = hit.id;
                state.dragOffsetMap = {
                    x: hit.x - worldPos.x,
                    y: hit.y - worldPos.y
                };
                syncCanvasCursor();
                updateStatus(`Moving ${hit.name || hit.id}`);
                return;
            }

            if (state.tool === "rotate_zone") {
                const hit = hitTestZone(p.x, p.y);
                if (!hit) return;
                const mapPixel = worldToMapPixel(hit.x, hit.y);
                const canvasPos = mapPixelToCanvas(mapPixel.x, mapPixel.y);
                state.rotatingZoneId = hit.id;
                state.rotateStartYaw = hit.yaw || 0;
                state.rotateStartAngle = Math.atan2(p.y - canvasPos.y, p.x - canvasPos.x);
                syncCanvasCursor();
                updateStatus(`Rotating ${hit.name || hit.id}`);
                return;
            }

            if (state.tool === "add_path") {
                const hit = hitTestZone(p.x, p.y);
                if (!hit) return;
                if (!state.pendingFromZone) {
                    state.pendingFromZone = hit.id;
                    updateStatus(`Path from ${hit.name || hit.id}...`);
                } else if (state.pendingFromZone !== hit.id) {
                    createPathBetween(state.pendingFromZone, hit.id);
                    state.pendingFromZone = null;
                }
                draw();
                return;
            }

            if (state.tool === "add" || state.tool === "erase") {
                state.strokeSnapshot = editCtx.getImageData(0, 0, editCanvas.width, editCanvas.height);
                paintCircle(mapPos.x, mapPos.y, state.tool === "erase");
                draw();
            }

            if (state.tool === "wall_line") {
                if (!state.lineStart) {
                    // First click — record start point
                    state.lineStart = { x: mapPos.x, y: mapPos.y };
                    state.linePreviewEnd = { x: mapPos.x, y: mapPos.y };
                    updateStatus("Wall Line: click end point (Esc to cancel)");
                } else {
                    // Second click — commit line to edit canvas
                    state.strokeSnapshot = editCtx.getImageData(0, 0, editCanvas.width, editCanvas.height);
                    editCtx.save();
                    editCtx.strokeStyle = "#000000";
                    editCtx.lineWidth = Math.max(1, Number(state.wallLineWidth) || 1);
                    editCtx.lineCap = "round";
                    editCtx.lineJoin = "round";
                    editCtx.beginPath();
                    editCtx.moveTo(state.lineStart.x, state.lineStart.y);
                    editCtx.lineTo(mapPos.x, mapPos.y);
                    editCtx.stroke();
                    editCtx.restore();
                    state.undoStack.push(state.strokeSnapshot);
                    state.strokeSnapshot = null;
                    state.lineStart = null;
                    state.linePreviewEnd = null;
                    saveEdits("wall_line");
                    draw();
                    updateStatus(TOOL_HINTS.wall_line);
                }
                cancelPointerInteraction(e);
                return;
            }

            if (state.tool === "dot_wall") {
                if (!state.dottedLineStart) {
                    state.dottedLineStart = { x: mapPos.x, y: mapPos.y };
                    state.dottedPreviewEnd = { x: mapPos.x, y: mapPos.y };
                    updateStatus("Dotted Wall: click end point (Esc to cancel)");
                } else {
                    state.dottedSegments.push([
                        state.dottedLineStart.x, state.dottedLineStart.y,
                        mapPos.x, mapPos.y
                    ]);
                    state.dottedLineStart = null;
                    state.dottedPreviewEnd = null;
                    saveDottedOverlay();
                    draw();
                    updateStatus(TOOL_HINTS.dot_wall);
                }
                cancelPointerInteraction(e);
                return;
            }

            if (state.tool === "dot_erase") {
                // Remove nearest segment within 12px threshold (in map pixel space)
                const THRESHOLD = 12 / state.view.scale;
                let bestIdx = -1, bestDist = Infinity;
                state.dottedSegments.forEach((seg, idx) => {
                    const d = pointToSegmentDist(mapPos.x, mapPos.y, seg[0], seg[1], seg[2], seg[3]);
                    if (d < bestDist) { bestDist = d; bestIdx = idx; }
                });
                if (bestIdx >= 0 && bestDist <= THRESHOLD) {
                    state.dottedSegments.splice(bestIdx, 1);
                    saveDottedOverlay();
                    draw();
                    updateStatus(`Removed segment (${state.dottedSegments.length} remaining)`);
                }
                cancelPointerInteraction(e);
                return;
            }

            if (state.tool === "set_robot_pose") {
                if (!state.robotPosePlacementStart) {
                    state.robotPosePlacementStart = { x: mapPos.x, y: mapPos.y };
                    state.robotPosePlacementPreviewEnd = { x: mapPos.x, y: mapPos.y };
                    updateStatus("Place Robot: click again to set heading");
                } else {
                    const startMap = state.robotPosePlacementStart;
                    const endMap = { x: mapPos.x, y: mapPos.y };
                    state.robotPosePlacementStart = null;
                    state.robotPosePlacementPreviewEnd = null;
                    commitRobotPoseFromPreview(startMap, endMap);
                    draw();
                    updateStatus(TOOL_HINTS.set_robot_pose);
                }
                cancelPointerInteraction(e);
                return;
            }
        });

        canvas.addEventListener("pointermove", (e) => {
            if (!state.mapReady) return;
            // Update wall-line preview even when pointer is not held down
            if (state.tool === "wall_line" && state.lineStart) {
                const p = getPos(e);
                const mapPos = canvasToMapPixel(p.x, p.y);
                state.linePreviewEnd = { x: mapPos.x, y: mapPos.y };
                draw();
            }
            // Update dotted wall preview
            if (state.tool === "dot_wall" && state.dottedLineStart) {
                const p = getPos(e);
                const mapPos = canvasToMapPixel(p.x, p.y);
                state.dottedPreviewEnd = { x: mapPos.x, y: mapPos.y };
                draw();
            }
            if (state.tool === "set_robot_pose" && state.robotPosePlacementStart) {
                const p = getPos(e);
                const mapPos = canvasToMapPixel(p.x, p.y);
                state.robotPosePlacementPreviewEnd = { x: mapPos.x, y: mapPos.y };
                draw();
            }
            if (!state.pointerDown) return;
            const p = getPos(e);
            const mapPos = canvasToMapPixel(p.x, p.y);

            if (state.draggingView && state.viewDragStart) {
                state.view.offsetX = state.viewDragStart.offsetX + (p.x - state.viewDragStart.x);
                state.view.offsetY = state.viewDragStart.offsetY + (p.y - state.viewDragStart.y);
                draw();
                return;
            }

            if (state.moveOriginEnabled && state.draggingOrigin) {
                state.originPx = mapPos.x;
                state.originPy = mapPos.y;
                updateOriginFromPixel(state.originPx, state.originPy);
                syncOriginInputs();
                draw();
                return;
            }

            if (state.tool === "move_zone" && state.draggingZoneId) {
                const worldPos = mapPixelToWorld(mapPos.x, mapPos.y);
                const zone = state.zones.get(state.draggingZoneId);
                if (zone) {
                    zone.x = worldPos.x + state.dragOffsetMap.x;
                    zone.y = worldPos.y + state.dragOffsetMap.y;
                    draw();
                }
                return;
            }

            if (state.tool === "rotate_zone" && state.rotatingZoneId) {
                const zone = state.zones.get(state.rotatingZoneId);
                if (zone) {
                    const mapPixel = worldToMapPixel(zone.x, zone.y);
                    const canvasPos = mapPixelToCanvas(mapPixel.x, mapPixel.y);
                    const angle = Math.atan2(p.y - canvasPos.y, p.x - canvasPos.x);
                    zone.yaw = state.rotateStartYaw + (angle - state.rotateStartAngle);
                    draw();
                }
                return;
            }

            if (state.tool === "add" || state.tool === "erase") {
                if (!state.strokeSnapshot) {
                    state.strokeSnapshot = editCtx.getImageData(0, 0, editCanvas.width, editCanvas.height);
                }
                paintCircle(mapPos.x, mapPos.y, state.tool === "erase");
                draw();
                return;
            }

            if (state.tool === "wall_line" && state.lineStart) {
                state.linePreviewEnd = { x: mapPos.x, y: mapPos.y };
                draw();
                return;
            }

            return;
        });

        function finishPointer(e) {
            if (!state.pointerDown) return;
            state.pointerDown = false;
            state.dragStart = null;
            if (e && typeof e.pointerId === "number") {
                try {
                    if (canvas.hasPointerCapture(e.pointerId)) {
                        canvas.releasePointerCapture(e.pointerId);
                    }
                } catch (err) {
                    // ignore
                }
            }

            if (state.moveOriginEnabled && state.draggingOrigin) {
                state.draggingOrigin = false;
                syncCanvasCursor();
                saveEdits("origin-drag");
                return;
            }

            if (state.draggingView) {
                state.draggingView = false;
                state.viewDragStart = null;
                syncCanvasCursor();
                updateStatus(TOOL_HINTS[state.tool] || "Ready");
                return;
            }

            if (state.tool === "move_zone" && state.draggingZoneId) {
                const zone = state.zones.get(state.draggingZoneId);
                const movedId = state.draggingZoneId;
                state.draggingZoneId = null;
                state.dragOffsetMap = null;
                syncCanvasCursor();
                if (zone) {
                    updateZonePose(zone);
                    updateAttachedPaths(movedId);
                }
                state.pointerDown = false;
                return;
            }

            if (state.tool === "rotate_zone" && state.rotatingZoneId) {
                const zone = state.zones.get(state.rotatingZoneId);
                state.rotatingZoneId = null;
                syncCanvasCursor();
                if (zone) {
                    updateZonePose(zone);
                }
                state.pointerDown = false;
                return;
            }

            if (state.tool === "add" || state.tool === "erase") {
                if (state.strokeSnapshot) {
                    state.undoStack.push(state.strokeSnapshot);
                    state.strokeSnapshot = null;
                }
                saveEdits(state.tool);
            }

        }

        canvas.addEventListener("pointerup", finishPointer);
        canvas.addEventListener("pointercancel", finishPointer);
        canvas.addEventListener("pointerleave", finishPointer);

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && state.tool === "wall_line" && state.lineStart) {
                state.lineStart = null;
                state.linePreviewEnd = null;
                draw();
                updateStatus(TOOL_HINTS.wall_line);
            }
            if (e.key === "Escape" && state.tool === "dot_wall" && state.dottedLineStart) {
                state.dottedLineStart = null;
                state.dottedPreviewEnd = null;
                draw();
                updateStatus(TOOL_HINTS.dot_wall);
            }
            if (e.key === "Escape" && state.tool === "set_robot_pose" && state.robotPosePlacementStart) {
                state.robotPosePlacementStart = null;
                state.robotPosePlacementPreviewEnd = null;
                draw();
                updateStatus(TOOL_HINTS.set_robot_pose);
            }
        });
        window.addEventListener("pointerup", finishPointer);
        canvas.addEventListener("contextmenu", (event) => {
            event.preventDefault();
        });

        canvas.addEventListener("wheel", (event) => {
            event.preventDefault();
            const pointer = getPos(event);
            const zoomFactor = event.deltaY < 0 ? 1.12 : (1 / 1.12);
            zoomAt(zoomFactor, pointer.x, pointer.y);
        }, { passive: false });

        zoomInBtn?.addEventListener("click", () => {
            zoomAt(1.15, canvas.width / 2, canvas.height / 2);
        });

        zoomOutBtn?.addEventListener("click", () => {
            zoomAt(1 / 1.15, canvas.width / 2, canvas.height / 2);
        });

        zoomResetBtn?.addEventListener("click", () => {
            resetZoom();
        });

        async function loadMap(options = {}) {
            const forceReload = !!options.forceReload;
            let activeMapPath = "";
            try {
                const active = await getJson(API.activeMap);
                if (active.response.ok && active.data.ok !== false) {
                    activeMapPath = String(active.data.map_yaml_path || active.data.map_path || "").trim();
                    if (activeMapPath) {
                        state.activeMapPath = activeMapPath;
                        setLayoutStatus(activeMapPath);
                    }
                }
            } catch (e) {
                // Keep last known active map path.
            }

            let data = null;
            try {
                const preview = forceReload
                    ? await postJson(API.editorReload, {})
                    : await getJson(API.preview);
                if (preview.response.ok && preview.data && preview.data.ok && preview.data.image) {
                    data = preview.data;
                }
            } catch (e) {
                // Retry with a forced editor reload below.
            }

            if (!data && !forceReload) {
                try {
                    const reload = await postJson(API.editorReload, {});
                    if (reload.response.ok && reload.data && reload.data.ok && reload.data.image) {
                        data = reload.data;
                    }
                } catch (e) {
                    // handled below
                }
            }

            if (!data || !data.image) {
                updateStatus("Map load failed: editor preview is unavailable");
                return;
            }

            state.mapInfo = {
                resolution: data.resolution,
                origin: data.origin,
                width: data.width,
                height: data.height,
                negate: data.negate || 0
            };

            state.origin = {
                x: data.origin[0] || 0,
                y: data.origin[1] || 0,
                yaw: data.origin[2] || 0
            };
            state.initialOrigin = { ...state.origin };
            state.loadedMapPath = String(data.map_yaml_path || activeMapPath || "").trim();
            if (state.loadedMapPath) {
                state.activeMapPath = state.loadedMapPath;
                setLayoutStatus(state.loadedMapPath);
            }

            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                editCanvas.width = img.width;
                editCanvas.height = img.height;
                editCtx.clearRect(0, 0, editCanvas.width, editCanvas.height);
                editCtx.drawImage(img, 0, 0);
                updateOriginPixel();
                state.mapReady = true;
                syncOriginInputs();
                updateZoomReadout();
                updateStatus(`Map loaded: ${basename(state.loadedMapPath || state.activeMapPath) || "active_map"}`);
                draw();
            };
            img.src = `data:image/png;base64,${data.image}`;
        }

        async function loadZones() {
            try {
                const resp = await fetch(API.zones);
                const data = await resp.json();
                const zones = data.zones || {};
                state.zones.clear();
                Object.entries(zones).forEach(([name, zone]) => {
                    let x = Number(zone.x);
                    let y = Number(zone.y);
                    let yaw = Number(zone.theta);
                    if (!Number.isFinite(x) || !Number.isFinite(y)) {
                        if (zone.position) {
                            x = Number(zone.position.x);
                            y = Number(zone.position.y);
                        }
                    }
                    if (!Number.isFinite(yaw) && zone.orientation) {
                        const q = zone.orientation;
                        const siny = 2.0 * (q.w * q.z + q.x * q.y);
                        const cosy = 1.0 - 2.0 * (q.y * q.y + q.z * q.z);
                        yaw = Math.atan2(siny, cosy);
                    }
                    state.zones.set(name, {
                        id: name,
                        name: zone.name || name,
                        x: Number.isFinite(x) ? x : 0,
                        y: Number.isFinite(y) ? y : 0,
                        yaw: Number.isFinite(yaw) ? yaw : 0,
                        radius_m: Number(zone.radius_m) || 0,
                        type: String(zone.type || "normal").trim().toLowerCase(),
                        speed: Number(zone.speed) || 0.5,
                        charge_duration: Number(zone.charge_duration) || 0
                    });
                });
                draw();
            } catch (e) {
                updateStatus("Zones load failed");
            }
        }

        async function loadPaths() {
            try {
                const resp = await fetch(API.paths);
                const data = await resp.json();
                const paths = data.paths || {};
                state.paths.clear();
                Object.entries(paths).forEach(([name, rawPath]) => {
                    const points = Array.isArray(rawPath)
                        ? rawPath
                        : ((rawPath && typeof rawPath === "object" && Array.isArray(rawPath.points)) ? rawPath.points : []);
                    state.paths.set(name, {
                        id: name,
                        points
                    });
                });
                draw();
            } catch (e) {
                updateStatus("Paths load failed");
            }
        }

        async function loadLayoutInfo() {
            try {
                const resp = await fetch(API.layouts);
                const data = await resp.json();
                const previousLayout = state.currentLayout;
                state.currentLayout = data.current || null;
                if (state.currentLayout && state.currentLayout !== previousLayout) {
                    updateStatus(`Layout loaded: ${state.currentLayout}`);
                }
            } catch (e) {
                state.currentLayout = null;
            }
        }

        async function updateZonePose(zone) {
            try {
                const { data } = await postJson(API.zoneUpdate, {
                    name: zone.id,
                    x: zone.x,
                    y: zone.y,
                    theta: zone.yaw || 0,
                    overwrite: true
                });
                if (data.ok === false) {
                    updateStatus(data.message || "Zone update failed");
                } else {
                    updateStatus(`Zone ${zone.name || zone.id} updated`);
                }
            } catch (e) {
                updateStatus("Zone update failed");
            }
        }

        async function savePathToRos(pathId, points) {
            try {
                const { data } = await postJson(API.pathSave, {
                    name: pathId,
                    path: points,
                    overwrite: true
                });
                if (data.ok === false) {
                    updateStatus(data.message || "Path save failed");
                } else {
                    updateStatus(`Path ${pathId} saved`);
                }
            } catch (e) {
                updateStatus("Path save failed");
            }
        }

        function updateAttachedPaths(zoneId) {
            state.paths.forEach((path, pathId) => {
                const parts = pathId.split("__");
                if (parts.length !== 2) return;
                if (parts[0] !== zoneId && parts[1] !== zoneId) return;
                const pts = getRenderablePathPoints(pathId, path);
                if (pts && pts.length >= 2) {
                    path.points = pts.map(p => ({ x: p.x, y: p.y }));
                    savePathToRos(pathId, path.points);
                }
            });
        }

        function hitTestZone(px, py, pickRadius = 18) {
            let best = null;
            let bestD2 = Infinity;
            state.zones.forEach(zone => {
                const mapPixel = worldToMapPixel(zone.x, zone.y);
                const canvasPos = mapPixelToCanvas(mapPixel.x, mapPixel.y);
                const dx = px - canvasPos.x;
                const dy = py - canvasPos.y;
                const d2 = dx * dx + dy * dy;
                if (d2 < bestD2 && d2 < pickRadius * pickRadius) {
                    bestD2 = d2;
                    best = zone;
                }
            });
            return best;
        }

        function createPathBetween(fromId, toId) {
            const from = state.zones.get(fromId);
            const to = state.zones.get(toId);
            if (!from || !to) return;

            const pathId = `${fromId}__${toId}`;
            const points = [
                { x: from.x, y: from.y },
                { x: to.x, y: to.y }
            ];
            state.paths.set(pathId, { id: pathId, points });
            savePathToRos(pathId, points);
            updateStatus(`Path ${fromId} -> ${toId}`);
            draw();
        }

        async function refreshRobotPose() {
            try {
                const resp = await fetch(API.robotPose);
                const data = await resp.json();
                if (data && data.pose) {
                    state.robotPose = data.pose;
                } else {
                    state.robotPose = null;
                }
                draw();
            } catch (e) {
                // ignore
            }
        }

        async function refreshScanOverlay() {
            if (!state.dottedViewMode) {
                return;
            }
            try {
                const resp = await fetch(API.scan);
                const data = await resp.json();
                state.scanPoints = Array.isArray(data?.scan) ? data.scan : [];
                state.scanSource = String(data?.source || "");
                state.scanOrigin = (data && typeof data.origin === "object" && data.origin) ? data.origin : null;
                if (!state.robotPose && state.scanOrigin) {
                    const x = Number(state.scanOrigin.x);
                    const y = Number(state.scanOrigin.y);
                    const theta = Number(state.scanOrigin.theta);
                    if (Number.isFinite(x) && Number.isFinite(y)) {
                        state.robotPose = {
                            x,
                            y,
                            theta: Number.isFinite(theta) ? theta : 0.0
                        };
                    }
                }
                draw();
            } catch (e) {
                // ignore
            }
        }

        async function commitRobotPoseFromPreview(startMap, endMap) {
            const startWorld = mapPixelToWorld(startMap.x, startMap.y);
            const endWorld = mapPixelToWorld(endMap.x, endMap.y);
            const dx = endWorld.x - startWorld.x;
            const dy = endWorld.y - startWorld.y;
            const theta = Math.hypot(dx, dy) > 0.03
                ? Math.atan2(dy, dx)
                : (Number(state.robotPose?.theta) || 0.0);

            try {
                updateStatus("Placing robot pose...");
                const { response, data } = await postJson(API.robotSetPose, {
                    x: startWorld.x,
                    y: startWorld.y,
                    theta
                });
                if (!response.ok || data?.ok === false) {
                    throw new Error(data?.message || "Set robot pose failed");
                }
                state.robotPose = {
                    x: startWorld.x,
                    y: startWorld.y,
                    theta
                };
                await refreshScanOverlay();
                draw();
                updateStatus(data?.message || "Robot pose placed");
            } catch (err) {
                updateStatus(`Set pose failed: ${err.message}`);
            }
        }

        async function triggerAutoRelocate() {
            try {
                updateStatus("Running Auto Reloc...");
                const { response, data } = await postJson(API.autoRelocate, {});
                if (!response.ok || data?.ok === false) {
                    throw new Error(data?.message || "Auto Reloc failed");
                }
                await refreshRobotPose();
                await refreshScanOverlay();
                updateStatus(data?.message || "Auto Reloc complete");
            } catch (err) {
                updateStatus(`Auto Reloc failed: ${err.message}`);
            }
        }

        async function syncActiveMapPreviewIfNeeded() {
            try {
                const active = await getJson(API.activeMap);
                if (!active.response.ok || active.data.ok === false) {
                    return;
                }
                const nextActiveMapPath = String(active.data.map_yaml_path || active.data.map_path || "").trim();
                if (!nextActiveMapPath) {
                    return;
                }
                const activeChanged = nextActiveMapPath !== state.activeMapPath;
                if (activeChanged) {
                    state.activeMapPath = nextActiveMapPath;
                    updateStatus(`Active map changed to ${basename(nextActiveMapPath)} - reloading editor`);
                    await loadMap({ forceReload: true });
                }
            } catch (e) {
                // ignore background sync failures
            }
        }

        function pointToSegmentDist(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1, dy = y2 - y1;
            const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return Math.hypot(px - x1, py - y1);
            const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / lenSq));
            return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
        }

        async function loadDottedOverlay() {
            try {
                const r = await fetch(API.dottedOverlay);
                const d = await r.json();
                if (d && Array.isArray(d.segments)) {
                    state.dottedSegments = d.segments;
                }
            } catch (e) {
                // ignore
            }
        }

        async function saveDottedOverlay() {
            try {
                await fetch(API.dottedOverlay, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ segments: state.dottedSegments })
                });
            } catch (e) {
                // ignore
            }
        }

        async function refreshDottedBackground(options = {}) {
            const silent = !!options.silent;
            if (!silent) {
                updateStatus("Refreshing dotted map…");
            }
            try {
                const dottedUrl = new URL(API.editorPreview, window.location.origin);
                dottedUrl.searchParams.set("dotted", "true");
                dottedUrl.searchParams.set("_ts", String(Date.now()));
                const r = await fetch(dottedUrl.toString(), { cache: "no-store" });
                const d = await r.json();
                if (d && d.ok && d.image) {
                    const img = new Image();
                    img.onload = () => {
                        state.dottedBgImage = img;
                        draw();
                        if (!silent) {
                            updateStatus("Dotted map ready — use Add, Erase, Place Bot, or Reloc");
                        }
                    };
                    img.src = "data:image/png;base64," + d.image;
                } else {
                    if (!silent) {
                        updateStatus("Dotted map render unavailable");
                    }
                }
            } catch (e) {
                if (!silent) {
                    updateStatus("Failed to load dotted map: " + e.message);
                }
            }
        }

        function scheduleDottedBackgroundRefresh(delayMs = 450) {
            if (!state.dottedViewMode) {
                return;
            }
            if (state.dottedRefreshTimer) {
                window.clearTimeout(state.dottedRefreshTimer);
            }
            state.dottedRefreshTimer = window.setTimeout(async () => {
                state.dottedRefreshTimer = null;
                await refreshDottedBackground({ silent: true });
            }, delayMs);
        }

        async function toggleDottedView() {
            state.dottedViewMode = !state.dottedViewMode;
            const btn = document.getElementById("dotted-view-btn");
            const dotPlaceRobotBtn = document.getElementById("dot-place-robot-btn");
            const dotAutoRelocBtn = document.getElementById("dot-auto-reloc-btn");
            const dotRefreshBtn = document.getElementById("dot-refresh-btn");
            if (state.dottedViewMode) {
                btn?.classList.add("active");
                if (dotPlaceRobotBtn) dotPlaceRobotBtn.style.display = "";
                if (dotAutoRelocBtn) dotAutoRelocBtn.style.display = "";
                if (dotRefreshBtn) dotRefreshBtn.style.display = "";
                await loadDottedOverlay();
                await refreshDottedBackground();
                await refreshRobotPose();
                await refreshScanOverlay();
                setTool("add");
            } else {
                btn?.classList.remove("active");
                if (dotPlaceRobotBtn) dotPlaceRobotBtn.style.display = "none";
                if (dotAutoRelocBtn) dotAutoRelocBtn.style.display = "none";
                if (dotRefreshBtn) dotRefreshBtn.style.display = "none";
                state.dottedLineStart = null;
                state.dottedPreviewEnd = null;
                state.robotPosePlacementStart = null;
                state.robotPosePlacementPreviewEnd = null;
                state.scanPoints = [];
                state.scanSource = "";
                state.scanOrigin = null;
                setTool("add");
                draw();
            }
        }

        async function init() {
            await loadMap({ forceReload: true });
            await loadLayoutInfo();
            await loadZones();
            await loadPaths();
            syncOriginInputs();
            syncGridButton();
            Object.keys(state.overlayVisibility).forEach((key) => syncOverlayButtons(key));
            setTool("add");
            syncCanvasCursor();

            document.getElementById("dotted-view-btn")?.addEventListener("click", toggleDottedView);
            document.getElementById("dot-place-robot-btn")?.addEventListener("click", () => setTool("set_robot_pose"));
            document.getElementById("dot-auto-reloc-btn")?.addEventListener("click", triggerAutoRelocate);
            document.getElementById("dot-refresh-btn")?.addEventListener("click", async () => {
                await saveDottedOverlay();
                await refreshDottedBackground();
                await refreshScanOverlay();
            });

            setInterval(refreshRobotPose, 1000);
            setInterval(refreshScanOverlay, 900);
            setInterval(async () => {
                await syncActiveMapPreviewIfNeeded();
                await loadLayoutInfo();
                await loadZones();
                await loadPaths();
            }, 5000);
        }

        init();
    </script>
</body>

</html>
